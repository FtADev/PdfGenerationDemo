<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"></meta>
    <title th:text="${title}">Report</title>

    <style>
        @page {
            size: A4;
            margin: 140px 30px 60px 30px;

            @top-center {
                content: element(page-header);
            }

            @bottom-center {
                content: "Page " counter(page);
                font-size: 12px;
            }
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            margin: 0;
            padding: 0;
        }

        /* REPEATING HEADER */
        .header {
            position: running(page-header);
            width: 100%;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .header-table {
            width: 100%;
            border-collapse: collapse;
        }

        .header-table td {
            vertical-align: middle;
            padding: 5px;
        }

        .left {
            width: 30%;
            text-align: left;
        }

        .center {
            width: 40%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .right {
            width: 30%;
            text-align: right;
        }

        .logo {
            width: 80px;
            height: auto;
        }

        .info-section {
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .info-row {
            margin-bottom: 5px;
        }

        /* REPORT TABLE */
        table.report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .report-table th {
            background-color: #dddddd;
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        .report-table td {
            border: 1px solid black;
            padding: 6px;
        }

        /* IMPORTANT FOR MULTI PAGE TABLE */
        thead {
            display: table-header-group;
        }

        tr {
            page-break-inside: avoid;
        }

        /* Fix for table layout */
        .report-table {
            width: 100%;
            table-layout: fixed;
        }

        .report-table th:nth-child(1), .report-table td:nth-child(1) { width: 10%; }
        .report-table th:nth-child(2), .report-table td:nth-child(2) { width: 40%; }
        .report-table th:nth-child(3), .report-table td:nth-child(3) { width: 15%; }
        .report-table th:nth-child(4), .report-table td:nth-child(4) { width: 15%; }
        .report-table th:nth-child(5), .report-table td:nth-child(5) { width: 20%; }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <table class="header-table">
        <tr>
            <!-- LEFT -->
            <td class="left">
                <div>
                    <strong>Date:</strong>
                    <span th:text="${date}"></span>
                </div>
                <div>
                    <strong>Time:</strong>
                    <span th:text="${time}"></span>
                </div>
            </td>

            <!-- CENTER -->
            <td class="center" th:text="${title}">
                SALES REPORT
            </td>

            <!-- RIGHT -->
            <td class="right">
                <div>Company Logo</div>
            </td>
        </tr>
    </table>

    <!-- EXTRA INFORMATION -->
    <div class="info-section">
        <div class="info-row">
            <strong>Generated By:</strong>
            <span th:text="${generatedBy}"></span>
        </div>
        <div class="info-row">
            <strong>Department:</strong>
            <span th:text="${department}"></span>
        </div>
        <div class="info-row">
            <strong>Total Records:</strong>
            <span th:text="${items.size()}"></span>
        </div>
    </div>
</div>

<!-- TABLE -->
<table class="report-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.id}"></td>
        <td th:text="${item.name}"></td>
        <td th:text="${'$' + #numbers.formatDecimal(item.price, 1, 2)}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${'$' + #numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
