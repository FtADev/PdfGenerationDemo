<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .button-group {
            margin-top: 20px;
        }
        .preview-btn {
            background-color: #2196F3;
        }
        .excel-btn {
            background-color: #FF9800;
        }
    </style>
</head>
<body>
<h1>Report Generator</h1>

<form id="reportForm">
    <div class="form-group">
        <label for="title">Report Title:</label>
        <input type="text" id="title" name="title" value="SALES REPORT">
    </div>

    <div class="form-group">
        <label for="generatedBy">Generated By:</label>
        <input type="text" id="generatedBy" name="generatedBy" value="System Administrator">
    </div>

    <div class="form-group">
        <label for="department">Department:</label>
        <input type="text" id="department" name="department" value="Sales Department">
    </div>

    <div class="button-group">
        <button type="button" onclick="generatePDF()">Download PDF</button>
        <button type="button" class="excel-btn" onclick="generateExcel()">Download Excel</button>
        <button type="button" class="preview-btn" onclick="previewHTML()">Preview HTML</button>
    </div>
</form>

<script>
    function getParams() {
        return {
            title: document.getElementById('title').value,
            generatedBy: document.getElementById('generatedBy').value,
            department: document.getElementById('department').value
        };
    }

    function generatePDF() {
        const params = getParams();
        const queryString = new URLSearchParams(params).toString();
        window.location.href = '/api/reports/pdf?' + queryString;
    }

    function generateExcel() {
        const params = getParams();
        const queryString = new URLSearchParams(params).toString();
        window.location.href = '/api/reports/excel?' + queryString;
    }

    function previewHTML() {
        const params = getParams();
        const queryString = new URLSearchParams(params).toString();
        window.open('/api/reports/html/preview?' + queryString, '_blank');
    }
</script>
</body>
</html>
